<div class="modal fade bg-black/50 backdrop-blur-sm"
     id="{{ div_id }}"
     tabindex="-1"
     aria-hidden="true">

  <div class="modal-dialog modal-xl">
    <div class="modal-content bg-gray-950 text-gray-200 border border-gray-800 rounded-xl shadow-2xl h-[92vh] flex flex-col overflow-hidden">

      <!-- Header -->
      <div class="px-6 py-4 border-b border-gray-800">
        <h2 class="text-lg font-semibold text-yellow-400 uppercase tracking-wide">
          {{ title }}
        </h2>
      </div>

      <!-- Input -->
      <div class="px-6 py-4 border-b border-gray-800 flex gap-3">
        <input id="queryInput"
               type="text"
               placeholder="Enter query..."
               class="flex-1 bg-gray-900 border border-gray-700 rounded px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">

        <button onclick="runQuery('{{ div_id }}', '{{ url }}', '{{ format }}')"
                class="bg-yellow-400 text-black px-4 py-2 rounded text-sm font-semibold hover:bg-yellow-300 transition">
          Search
        </button>
      </div>

      <!-- Results -->
      <div id="resultsContainer"
           class="flex-1 overflow-y-auto px-6 py-4 space-y-4">
        <div class="text-center text-gray-500 py-10">
          Enter a query to fetch results.
        </div>
      </div>

    </div>
  </div>
</div>

<script>
async function runQuery(modalId, url, format) {
  const modal = document.getElementById(modalId);
  if (!modal) return;
  const csrfToken = document.querySelector('meta[name="csrf-token"]').content;

  const inputEl = modal.querySelector('#queryInput');
  const container = modal.querySelector('#resultsContainer');
  const button = modal.querySelector('button');

  const input = inputEl.value.trim();
  if (!input) return;

  container.innerHTML = `
    <div class="text-center text-gray-400 py-10 animate-pulse">
      Fetching data...
    </div>
  `;
  button.disabled = true;
  console.log(input)
  try {
    const response = await fetch(`/api/${url}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken  
      },
      body: JSON.stringify({ [format]: input })
    });

    if (!response.ok) throw new Error('Network response was not ok');

    const data = await response.json();
    console.log(data)
    // Clear container
    container.innerHTML = '';

    // Handle "summary" response
    if (data.summary) {
      container.innerHTML += `
        <div class="border border-gray-800 rounded-lg bg-gray-900 hover:bg-gray-800/60 transition p-4">
          <p class="text-sm text-gray-300"><strong>Summary:</strong> ${data.summary}</p>
        </div>
      `;
    }

    // Handle NLP response
    if (data.data) {
      const nlp = data.data;
      container.innerHTML += `
        <div class="border border-gray-800 rounded-lg bg-gray-900 hover:bg-gray-800/60 transition p-4">
          <p class="text-sm font-semibold text-white mb-2">NLP Analysis</p>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-3 text-xs">
            <div class="bg-gray-800/60 p-2 rounded">
              <p class="text-gray-400">Label</p>
              <p class="text-white font-semibold">${nlp.label}</p>
            </div>
            <div class="bg-gray-800/60 p-2 rounded">
              <p class="text-gray-400">Score</p>
              <p class="text-white font-semibold">${nlp.score}</p>
            </div>
            <div class="bg-gray-800/60 p-2 rounded">
              <p class="text-gray-400">Risk</p>
              <p class="text-white font-semibold">${nlp.risk}</p>
            </div>
            <div class="bg-gray-800/60 p-2 rounded">
              <p class="text-gray-400">Sentiment</p>
              <p class="text-white font-semibold">${nlp.sentiment}</p>
            </div>
            <div class="bg-gray-800/60 p-2 rounded">
              <p class="text-gray-400">Polarity</p>
              <p class="text-white font-semibold">${nlp.polarity}</p>
            </div>
            <div class="bg-gray-800/60 p-2 rounded">
              <p class="text-gray-400">Entities</p>
              <p class="text-white font-semibold">${nlp.entities.length ? nlp.entities.join(', ') : 'None'}</p>
            </div>
          </div>
        </div>
      `;
    }

    if (!data.summary && !data.data) {
      container.innerHTML = `
        <div class="text-center text-gray-500 py-10">
          No results found.
        </div>
      `;
    }

  } catch (err) {
    container.innerHTML = `
      <div class="text-center text-red-400 py-10">
        Error fetching data.
      </div>
    `;
    console.error(err);
  } finally {
    button.disabled = false;
  }
}
</script>
